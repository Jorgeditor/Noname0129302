<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | LuckyTools</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="container">
        <div class="logo">
            <a href="index.html" style="text-decoration: none; color: inherit; display: inline-flex; align-items: center; gap: 10px;">
                <img src="logo-demo.png" alt="Logo" style="width: 30px; height: 30px; object-fit: contain;">
                LuckyTools
            </a>
        </div>
        <nav>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="licenses.html">Licenses</a>
        </nav>
    </header>

    <main>
        <div class="full-width-bg reveal reveal-up active">
            <section class="contact-section container">
                <div class="contact-content">
                    <h1>Contact LuckyTools</h1>
                    <p>Need help, have questions, or want to reach out?<br>The owner of LuckyTools will directly respond.</p>
                    
                    <a href="https://discord.gg/55xS3QpR5S" class="btn-discord" target="_blank">
                        <i class="fab fa-discord"></i> Join our Discord Server
                    </a>
                    
                    <div class="social-links-contact">
                        <a href="https://x.com/jorgeditor" target="_blank">X (Twitter)</a>
                    </div>
                    <div class="discount-code" id="discountBox" title="Click to copy code" style="margin-top: 40px;" translate="no">
                        Use code: <span class="code-highlight" id="promoCode">BUSCOEDITOR</span> for the $69.99 deal!
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        // Smooth Scroll Reveal Animation
        document.addEventListener('DOMContentLoaded', () => {
            const observerOptions = {
                threshold: 0.15
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, observerOptions);

            const revealElements = document.querySelectorAll('.reveal');
            revealElements.forEach(el => observer.observe(el));
        });

        // Click-to-copy for discount code
        const discountBox = document.getElementById('discountBox');
        if (discountBox) {
            discountBox.addEventListener('click', () => {
                const code = document.getElementById('promoCode').innerText;
                navigator.clipboard.writeText(code).then(() => {
                    const originalText = discountBox.innerHTML;
                    discountBox.classList.add('copied');
                    discountBox.innerHTML = '<i class="fas fa-check"></i> ' + code + ' Copied!';
                    setTimeout(() => {
                        discountBox.classList.remove('copied');
                        discountBox.innerHTML = originalText;
                    }, 2000);
                });
            });
        }
    </script>

    <footer class="footer-bottom">
        <div class="container">
            <p>&copy; 2026 LUCKYTOOLS PRO. AUTOMATING YOUR CREATIVITY.</p>
        </div>
    </footer>
</body>
</html>
